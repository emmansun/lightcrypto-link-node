name: Node.js CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]
        mongoose-version: [8, 9]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        registry-url: 'https://registry.npmjs.org'

    - name: Configure npm to use official registry
      run: |
        npm config set registry https://registry.npmjs.org
        # Optional: Remove any .npmrc if it exists (shouldn't be committed anyway)
        rm -f .npmrc

    - name: Install dependencies
      run: npm install --legacy-peer-deps
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Install mongoose ${{ matrix.mongoose-version }}
      run: npm install mongoose@${{ matrix.mongoose-version }} --no-save --legacy-peer-deps

    - name: Run linter
      run: npm run lint

    - name: Run unit tests
      run: npm run test:unit

    - name: Run integration tests
      run: npm run test:integration

    - name: Run interoperability tests
      run: npm run test:interop

    - name: Run all tests with coverage
      run: npm test -- --coverage

    - name: Upload coverage to Codecov
      if: matrix.node-version == '22.x' && matrix.mongoose-version == 9
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}

  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Configure npm to use official registry
      run: npm config set registry https://registry.npmjs.org

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Security audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Check for vulnerabilities
      run: npm audit --json > audit-results.json
      continue-on-error: true

    - name: Upload audit results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: audit-results
        path: audit-results.json
