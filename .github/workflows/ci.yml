name: Node.js CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        mongoose-version: [8, 9]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        # Force official registry for consistent package-lock.json behavior
        registry-url: 'https://registry.npmjs.org'

    - name: Configure npm to use official registry
      run: |
        npm config set registry https://registry.npmjs.org
        # Optional: Remove any .npmrc if it exists (shouldn't be committed anyway)
        rm -f .npmrc

    - name: Install dependencies
      run: npm install
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Install mongoose ${{ matrix.mongoose-version }}
      run: npm install mongoose@${{ matrix.mongoose-version }} --no-save

    - name: Run linter
      run: npm run lint

    - name: Run unit tests
      run: npm run test:unit

    - name: Run integration tests
      run: npm run test:integration

    - name: Run interoperability tests
      run: npm run test:interop

    - name: Run all tests with coverage
      run: npm test -- --coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x

    - name: Configure npm to use official registry
      run: npm config set registry https://registry.npmjs.org

    - name: Install dependencies
      run: npm install

    - name: Security audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Check for vulnerabilities
      run: npm audit --json > audit-results.json
      continue-on-error: true

    - name: Upload audit results
      uses: actions/upload-artifact@v3
      with:
        name: audit-results
        path: audit-results.json
